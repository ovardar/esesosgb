<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OSGB SaaS - Offline</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f6f9; color: #1e293b; padding: 30px; }
    .card { background: white; max-width: 520px; margin: 80px auto; padding: 25px; border-radius: 12px; border: 1px solid #e2e8f0; }
  

        /* ================================
           v24 UI POLISH - ortak arayuz duzeltmeleri
           ================================ */
        :root {
            --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.05);
            --shadow-md: 0 8px 24px rgba(15, 23, 42, 0.08);
            --shadow-lg: 0 18px 45px rgba(15, 23, 42, 0.10);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 18px;
            --focus-ring: 0 0 0 3px rgba(37, 99, 235, 0.18);
        }

        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif !important;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        .card {
            width: min(100%, 1240px) !important;
            max-width: 1240px !important;
            border-radius: var(--radius-lg) !important;
            box-shadow: var(--shadow-md) !important;
        }

        .global-header {
            background: linear-gradient(180deg, rgba(255,255,255,0.72), rgba(255,255,255,0));
            border-bottom-color: var(--border-color) !important;
        }

        .top-row {
            gap: 14px;
            align-items: center !important;
        }

        .logo-area {
            min-width: 0;
            font-size: 17px !important;
            letter-spacing: 0 !important;
            gap: 10px !important;
        }

        .logo-area span[id^="lbl_"] {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .tenant-logo-img {
            width: 36px !important;
            height: 36px !important;
            padding: 4px !important;
            border-radius: 10px !important;
            box-shadow: var(--shadow-sm);
            flex: 0 0 auto;
        }

        .logo-badge {
            border-radius: 999px !important;
            padding: 4px 9px !important;
            font-size: 11px !important;
            letter-spacing: .02em;
            flex: 0 0 auto;
        }

        .controls-group {
            gap: 10px !important;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .theme-selector-container {
            border-radius: 999px !important;
            padding: 6px 10px !important;
            box-shadow: var(--shadow-sm);
        }

        .theme-btn {
            width: 18px !important;
            height: 18px !important;
            transition: transform .15s ease, box-shadow .15s ease;
        }
        .theme-btn:hover { transform: translateY(-1px) scale(1.08); box-shadow: 0 3px 8px rgba(15,23,42,.18); }

        .user-info {
            background: var(--table-header);
            border: 1px solid var(--border-color);
            border-radius: 999px;
            padding: 7px 11px;
            max-width: 280px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .logout-btn,
        button,
        .btn,
        input[type="submit"] {
            border-radius: 10px !important;
            font-weight: 750 !important;
            transition: transform .15s ease, box-shadow .15s ease, filter .15s ease;
        }
        button:hover,
        .logout-btn:hover,
        .btn:hover,
        input[type="submit"]:hover {
            transform: translateY(-1px);
            filter: brightness(.98);
            box-shadow: var(--shadow-sm);
        }
        button:disabled { opacity: .55; cursor: not-allowed; transform: none !important; }

        .nav-container {
            justify-content: flex-start !important;
            gap: 7px !important;
            padding: 8px !important;
            border-radius: 14px !important;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .nav-btn {
            white-space: nowrap;
            border-radius: 10px !important;
            padding: 9px 13px !important;
            font-size: 12.5px !important;
            box-shadow: none;
        }
        .nav-btn.active-page { box-shadow: 0 4px 10px rgba(37, 99, 235, 0.22) !important; }

        h1, h2, h3 { letter-spacing: -0.02em; }
        h1 { font-size: clamp(24px, 3vw, 34px); }
        h2 { font-size: clamp(20px, 2.4vw, 28px); }
        h3 { font-size: clamp(16px, 1.8vw, 20px); }

        .section-title {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 24px !important;
            color: var(--text-main) !important;
            font-size: 13px !important;
            letter-spacing: .04em !important;
        }

        .panel,
        .form-card,
        .table-card,
        .sub-card,
        .mini-card,
        .info-card {
            border-radius: var(--radius-md) !important;
            box-shadow: var(--shadow-sm);
        }

        .metric-box {
            border-radius: 14px !important;
            box-shadow: 0 10px 24px rgba(15,23,42,.10) !important;
            position: relative;
            overflow: hidden;
        }
        .metric-box:after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,.20), transparent 45%);
            pointer-events: none;
        }
        .metric-title, .metric-sub, .metric-value { position: relative; z-index: 1; }

        input,
        select,
        textarea {
            border: 1px solid var(--border-color) !important;
            border-radius: 10px !important;
            background: var(--bg-card);
            color: var(--text-main);
            transition: border-color .15s ease, box-shadow .15s ease, background .15s ease;
        }
        input:focus,
        select:focus,
        textarea:focus {
            outline: none !important;
            border-color: var(--primary) !important;
            box-shadow: var(--focus-ring) !important;
        }
        label { font-weight: 700; color: var(--text-main); }

        table {
            border-collapse: separate !important;
            border-spacing: 0 !important;
            overflow: hidden;
            border-radius: 12px;
        }
        th {
            font-size: 11px !important;
            text-transform: uppercase;
            letter-spacing: .035em;
            white-space: nowrap;
        }
        td { line-height: 1.45; }
        tbody tr { transition: background .12s ease; }
        tbody tr:hover { background: rgba(37, 99, 235, 0.035); }
        .empty-state {
            border: 1px dashed var(--border-color);
            border-radius: 12px;
            background: var(--table-header);
        }

        .badge {
            border-radius: 999px !important;
            letter-spacing: .02em;
            padding: 4px 8px !important;
        }

        .small-link { text-underline-offset: 3px; }

        .operational-banner {
            box-shadow: var(--shadow-sm);
            border: 0 !important;
        }

        @media (max-width: 900px) {
            body { padding: 12px !important; }
            .card { padding: 16px !important; border-radius: 16px !important; }
            .top-row { align-items: stretch !important; }
            .controls-group { justify-content: flex-start; }
            .user-info { max-width: 100%; }
            .nav-container { flex-wrap: nowrap !important; justify-content: flex-start !important; }
            .nav-btn { flex: 0 0 auto; }
            table { display: block; width: 100%; overflow-x: auto; white-space: nowrap; }
            th, td { padding: 9px 10px !important; }
        }

        @media (max-width: 520px) {
            .logo-area { font-size: 15px !important; }
            .tenant-logo-img { width: 32px !important; height: 32px !important; }
            .theme-selector-container { width: 100%; justify-content: center; }
            .logout-btn { width: 100%; }
        }

    

        /* ================================
           v25 PRODUCT DESIGN SYSTEM - derin arayuz revizyonu
           ================================ */
        :root {
            --brand-50: #eff6ff;
            --brand-100: #dbeafe;
            --brand-500: #2563eb;
            --brand-600: #1d4ed8;
            --brand-700: #1e40af;
            --ink-900: #0f172a;
            --ink-700: #334155;
            --ink-500: #64748b;
            --surface-0: #ffffff;
            --surface-1: #f8fafc;
            --surface-2: #eef2f7;
            --success: #059669;
            --warning: #d97706;
            --danger: #dc2626;
            --info: #0284c7;
        }

        body {
            background:
                radial-gradient(circle at top left, rgba(37,99,235,.15), transparent 32rem),
                radial-gradient(circle at top right, rgba(14,165,233,.12), transparent 28rem),
                linear-gradient(180deg, #f8fafc 0%, #edf2f7 52%, #e9eef6 100%) !important;
            color: var(--ink-900) !important;
        }

        .card {
            padding: 0 !important;
            overflow: hidden;
            background: rgba(255,255,255,.92) !important;
            backdrop-filter: blur(10px);
        }

        .global-header {
            padding: 18px 22px 14px !important;
            margin-bottom: 0 !important;
            background: linear-gradient(135deg, rgba(15,23,42,.98), rgba(30,64,175,.92)) !important;
            color: white;
            border-bottom: 0 !important;
        }
        .global-header .logo-area,
        .global-header .user-info,
        .global-header .theme-selector-container span { color: white !important; }
        .global-header .theme-selector-container,
        .global-header .user-info {
            background: rgba(255,255,255,.10) !important;
            border-color: rgba(255,255,255,.18) !important;
            color: white !important;
        }
        .global-header .nav-container {
            background: rgba(255,255,255,.10) !important;
            border-color: rgba(255,255,255,.16) !important;
            margin-top: 12px;
        }
        .global-header .nav-btn {
            background: rgba(255,255,255,.10) !important;
            color: rgba(255,255,255,.86) !important;
            border: 1px solid rgba(255,255,255,.10);
        }
        .global-header .nav-btn:hover {
            background: rgba(255,255,255,.18) !important;
            color: white !important;
        }
        .global-header .nav-btn.active-page {
            background: white !important;
            color: var(--brand-700) !important;
            box-shadow: 0 8px 18px rgba(15,23,42,.22) !important;
        }
        .global-header .tenant-logo-img {
            width: 42px !important;
            height: 42px !important;
            background: white !important;
            border-color: rgba(255,255,255,.35) !important;
        }
        .global-header .logo-badge {
            background: rgba(255,255,255,.18) !important;
            border: 1px solid rgba(255,255,255,.18);
        }
        .logout-btn { background: rgba(239,68,68,.92) !important; }

        .card > h1,
        .card > h2,
        .card > .page-desc,
        .card > .section-title,
        .card > .dashboard-grid,
        .card > .kpi-grid,
        .card > .operational-banner,
        .card > .content-grid,
        .card > .grid,
        .card > .panel,
        .card > form,
        .card > table,
        .card > div:not(.global-header) {
            margin-left: 22px;
            margin-right: 22px;
        }
        .card > h1,
        .card > h2 {
            margin-top: 22px !important;
            margin-bottom: 4px !important;
            font-size: clamp(22px, 2.6vw, 31px) !important;
            letter-spacing: -0.035em;
            color: var(--ink-900);
        }
        .page-desc {
            max-width: 780px;
            color: var(--ink-500) !important;
            font-size: 14px !important;
            margin-bottom: 20px !important;
        }

        .section-title {
            margin-top: 24px !important;
            margin-bottom: 11px !important;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            color: var(--ink-700) !important;
            background: rgba(255,255,255,.72);
            border: 1px solid rgba(226,232,240,.9);
            padding: 7px 11px;
            border-radius: 999px;
            box-shadow: var(--shadow-sm);
        }

        .panel {
            background: linear-gradient(180deg, rgba(255,255,255,.96), rgba(248,250,252,.94)) !important;
            border: 1px solid rgba(203,213,225,.85) !important;
            box-shadow: 0 12px 30px rgba(15,23,42,.07) !important;
            border-radius: 18px !important;
        }
        .panel h3 {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            border-bottom: 1px solid rgba(226,232,240,.95) !important;
            padding-bottom: 12px !important;
            margin-bottom: 14px !important;
            color: var(--ink-900);
            letter-spacing: -0.01em;
        }
        .panel h3::after {
            content: "";
            flex: 1;
            height: 3px;
            max-width: 56px;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--primary), transparent);
            opacity: .7;
        }

        .dashboard-grid,
        .kpi-grid {
            gap: 16px !important;
        }
        .metric-box {
            position: relative;
            overflow: hidden;
            min-height: 104px !important;
            padding: 18px 19px !important;
            border-radius: 20px !important;
            box-shadow: 0 18px 38px rgba(15,23,42,.13) !important;
        }
        .metric-box::before {
            content: "";
            position: absolute;
            inset: -40% -30% auto auto;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: rgba(255,255,255,.17);
        }
        .metric-title { font-size: 12.5px !important; text-transform: uppercase; letter-spacing: .045em; }
        .metric-value { font-size: 34px !important; letter-spacing: -0.045em; }
        .metric-sub { font-size: 12px !important; }
        .metric-box.clickable:hover {
            transform: translateY(-3px);
            filter: saturate(1.04);
        }

        .content-grid {
            margin-bottom: 24px;
            align-items: start;
        }
        .operational-banner {
            min-height: 86px;
            padding: 20px 22px !important;
            border-radius: 20px !important;
        }
        .op-text h4 { font-size: 18px !important; letter-spacing: -0.015em; }
        .op-badge { border-radius: 16px !important; }

        table {
            background: white;
            box-shadow: inset 0 0 0 1px rgba(226,232,240,.75);
        }
        th {
            background: #f1f5f9 !important;
            color: #475569 !important;
        }
        td {
            background-clip: padding-box;
        }
        tbody tr:nth-child(even) td { background: rgba(248,250,252,.65); }

        .btn-primary,
        button.btn-primary {
            background: linear-gradient(135deg, var(--brand-600), var(--brand-700)) !important;
            color: white !important;
            border: 0 !important;
        }
        .btn-blue,
        button.btn-blue {
            background: linear-gradient(135deg, #0284c7, #0369a1) !important;
            color: white !important;
            border: 0 !important;
        }
        .btn-secondary,
        button.btn-secondary {
            background: #f1f5f9 !important;
            color: #334155 !important;
            border: 1px solid #cbd5e1 !important;
        }
        .btn-danger,
        button.btn-danger {
            background: linear-gradient(135deg, #dc2626, #991b1b) !important;
            color: white !important;
            border: 0 !important;
        }
        .status.ok {
            background: #ecfdf5 !important;
            color: #047857 !important;
            border: 1px solid #a7f3d0 !important;
        }
        .status.err {
            background: #fef2f2 !important;
            color: #b91c1c !important;
            border: 1px solid #fecaca !important;
        }

        /* SaaS Yonetimi urun paneli revizyonu */
        .grid {
            grid-template-columns: 420px minmax(0, 1fr) !important;
            gap: 22px !important;
            align-items: start !important;
            margin-bottom: 24px;
        }
        .grid > div:first-child {
            position: sticky;
            top: 18px;
            align-self: start;
        }
        .edit-panel {
            border: 1px solid rgba(37,99,235,.22) !important;
            background: linear-gradient(180deg, #ffffff, #f8fbff) !important;
        }
        .link-box {
            border-radius: 12px !important;
            border: 1px solid #bfdbfe !important;
            background: linear-gradient(180deg, #eff6ff, #ffffff) !important;
            color: #1e40af !important;
            font-weight: 750;
        }
        .logo-upload-box {
            border: 1px dashed #93c5fd !important;
            background: #f8fbff !important;
            border-radius: 16px !important;
        }
        .logo-preview {
            width: 56px !important;
            height: 56px !important;
            border-radius: 14px !important;
            box-shadow: var(--shadow-sm);
        }
        .actions {
            gap: 9px !important;
            align-items: center;
            flex-wrap: wrap;
        }
        .actions + .button-help,
        .button-help {
            margin-top: 10px;
            display: grid;
            gap: 7px;
            color: var(--ink-500);
            font-size: 12px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 11px 12px;
        }
        .button-help strong { color: var(--ink-700); }

        @media (max-width: 1040px) {
            .grid { grid-template-columns: 1fr !important; }
            .grid > div:first-child { position: static; }
        }
        @media (max-width: 900px) {
            .card > h1,
            .card > h2,
            .card > .page-desc,
            .card > .section-title,
            .card > .dashboard-grid,
            .card > .kpi-grid,
            .card > .operational-banner,
            .card > .content-grid,
            .card > .grid,
            .card > .panel,
            .card > form,
            .card > table,
            .card > div:not(.global-header) {
                margin-left: 14px !important;
                margin-right: 14px !important;
            }
            .global-header { padding: 15px !important; }
            .metric-box { min-height: 92px !important; }
        }

    
        /* v26.1 layout and typography fixes */
        .logo-area { font-weight: 600 !important; letter-spacing: .1px !important; font-size: 17px !important; }
        .logo-area #lbl_osgb_title { font-weight: 600 !important; }
        .tenant-logo-img { width: 34px !important; height: 34px !important; object-fit: contain !important; border-radius: 8px !important; background: #fff !important; border: 1px solid var(--border-color) !important; padding: 3px !important; box-sizing: border-box !important; flex: 0 0 auto !important; }
        table, thead, tbody, tr, th, td { font-family: inherit !important; }
        table { font-size: 13px !important; }
        th, td { line-height: 1.35 !important; vertical-align: middle !important; }
        tbody td { padding: 9px 11px !important; }
        .page-desc { max-width: none !important; }
    
    </style>
</head>
<body>
  <div class="card">
    <h2>Çevrimdışı mod</h2>
    <p>İnternet bağlantısı yok. Daha önce açılmış olan Risk Motoru sayfasından kayıt oluşturabilirsiniz.</p>
    <p>Bağlantı geri geldiğinde bekleyen kayıtlar otomatik olarak gönderilecektir.</p>
  </div>
</body>
</html>
