          <p style="font-size:15px;color:var(--text-muted);line-height:1.7;margin-bottom:32px;">Bu modul yakin zamanda aktif olacaktir. Sozlesmeler teklif gibi kolayca izlenebilir bir ekranda takip edilebilecektir.</p>
          <div style="display:inline-flex;align-items:center;gap:8px;background:#e0f2fe;color:#0369a1;padding:10px 20px;border-radius:10px;font-weight:700;font-size:13px;border:1px solid #bae6fd;">&#x1F6A7; Gelistirme Asamasinda</div>

    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        const checkAuth = setInterval(async () => {
          if (window.requireAuthAndRole) {
            clearInterval(checkAuth);
            const auth = await window.requireAuthAndRole("crm-contracts");
            if (auth) document.body.style.display = "block";
          }
        }, 100);
      });
    </script>
