<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSGB SaaS - Firma Detay Raporu</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f6f9; padding: 30px; display: none; }
        .card { background: white; padding: 25px; border-radius: 12px; max-width: 1000px; margin: 0 auto; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .back-btn { background: #64748b; color: white; border: none; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-weight: bold; font-size: 13px; }
        .back-btn:hover { background: #475569; }
        
        .company-profile { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 20px; margin-top: 20px; margin-bottom: 25px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .profile-item { font-size: 14px; }
        .profile-label { color: #64748b; font-weight: 600; text-transform: uppercase; font-size: 11px; }
        .profile-value { color: #1e293b; font-weight: bold; font-size: 15px; margin-top: 4px; }

        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .panel { background: white; border: 1px solid #e2e8f0; border-radius: 10px; padding: 20px; }
        .panel-title-uzman { color: #0284c7; border-bottom: 2px solid #0284c7; padding-bottom: 8px; margin-top: 0; }
        .panel-title-hekim { color: #16a34a; border-bottom: 2px solid #16a34a; padding-bottom: 8px; margin-top: 0; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 12px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background-color: #f8fafc; color: #475569; font-weight: 600; }
        .badge { padding: 3px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .status-closed { background-color: #f0fdf4; opacity: 0.7; }
        
        .pdf-btn { background: #16a34a; color: white; border: none; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer; }
        .pdf-btn:hover { background: #15803d; }
    </style>
</head>
<body>

<div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <a href="index.html" class="back-btn">← Ana Panele Geri Dön</a>
        <span style="font-size: 13px; color: #94a3b8; font-weight: bold;">FİRMA 360° ÖZET RAPORU</span>
    </div>

    <div class="company-profile">
        <div class="profile-item">
            <div class="profile-label">Firma Ticari Unvanı</div>
            <div class="profile-value" id="lbl_company_name">Yükleniyor...</div>
        </div>
        <div class="profile-item">
            <div class="profile-label">Vergi Numarası</div>
            <div class="profile-value" id="lbl_tax_number">-</div>
        </div>
        <div class="profile-item">
            <div class="profile-label">NACE Kodu</div>
            <div class="profile-value" id="lbl_nace_code">-</div>
        </div>
        <div class="profile-item">
            <div class="profile-label">Tehlike Sınıfı</div>
            <div class="profile-value" id="lbl_danger_class">-</div>
        </div>
    </div>

    <div class="detail-grid">
        
        <!-- SOL PANEL -->
        <div class="panel">
            <h3 class="panel-title-uzman">🦺 Uzman Risk Bulguları</h3>
            <table>
                <thead>
                    <tr>
                        <th>Tehlike Tanımı</th>
                        <th>Skor</th>
                        <th>Termin</th>
                        <th>Durum</th>
                    </tr>
                </thead>
                <tbody id="company_risk_tbody">
                    <tr><td colspan="4" style="text-align:center; color:#94a3b8;">Veriler süzülüyor...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- SAĞ PANEL -->
        <div class="panel">
            <h3 class="panel-title-hekim">🩺 Hekim Sağlık Kartları</h3>
            <table>
                <thead>
                    <tr>
                        <th>Çalışan (Yaş/Cins)</th>
                        <th>Hekim Kararı</th>
                        <th>Aksiyon</th>
                    </tr>
                </thead>
                <tbody id="company_medical_tbody">
                    <tr><td colspan="3" style="text-align:center; color:#94a3b8;">Veriler süzülüyor...</td></tr>
                </tbody>
            </table>
        </div>

    </div>
</div>

<script>
    const SUPABASE_URL = "https://dnvuizausfcjzkcsynql.supabase.co";
    const SUPABASE_KEY = "sb_publishable_LtrytF9wyS3u-KgSZk7heg_SZc7hhoY";
    const dbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    let currentCompanyName = "";

    // 🧠 TÜRKÇE KARAKTERLERİ TEMİZLEYEN AKILLI SÜZGEÇ
    function clearTurkishChars(str) {
        if(!str) return "-";
        return str.toString()
            .replace(/Ş/g, "S").replace(/ş/g, "s")
            .replace(/Ç/g, "C").replace(/ç/g, "c")
            .replace(/Ğ/g, "G").replace(/ğ/g, "g")
            .replace(/İ/g, "I").replace(/ı/g, "i")
            .replace(/Ö/g, "O").replace(/ö/g, "o")
            .replace(/Ü/g, "U").replace(/ü/g, "u");
    }

    window.onload = async function() {
        const { data: { session } } = await dbClient.auth.getSession();
        if (!session) { window.location.href = "login.html"; return; }
        document.body.style.display = "block";

        const urlParams = new URLSearchParams(window.location.search);
        const companyId = urlParams.get('id');

        if (!companyId) { window.location.href = "index.html"; return; }

        await fetchCompanyProfile(companyId);
        fetchCompanyRisks(companyId);
        fetchCompanyMedical(companyId);
    };

    async function fetchCompanyProfile(id) {
        try {
            const { data } = await dbClient.from('customer_companies').select('*').eq('id', id).single();
            if (data) {
                currentCompanyName = data.company_name;
                document.getElementById('lbl_company_name').innerText = data.company_name;
                document.getElementById('lbl_tax_number').innerText = data.tax_number || '-';
                document.getElementById('lbl_nace_code').innerText = data.nace_code || '-';
                document.getElementById('lbl_danger_class').innerText = data.danger_class;
            }
        } catch (err) { console.error(err.message); }
    }

    async function fetchCompanyRisks(id) {
        const tbody = document.getElementById('company_risk_tbody');
        try {
            const { data } = await dbClient.from('risk_assessments').select('*').eq('company_id', id).order('created_at', { ascending: false });
            if (!data || data.length === 0) { tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#94a3b8;">Kayıtlı risk yok.</td></tr>`; return; }
            tbody.innerHTML = '';
            data.forEach(r => {
                const isClosed = r.status === 'Kapalı';
                tbody.innerHTML += `<tr class="${isClosed ? 'status-closed' : ''}"><td>${isClosed ? `<s>${r.hazard_title}</s>` : r.hazard_title}</td><td><strong>${r.risk_score}</strong></td><td>${r.target_date}</td><td><span class="badge" style="background:${isClosed ? '#dcfce7' : '#fee2e2'}; color:${isClosed ? '#15803d' : '#b91c1c'};">${r.status}</span></td></tr>`;
            });
        } catch (err) { console.error(err.message); }
    }

    async function fetchCompanyMedical(id) {
        const tbody = document.getElementById('company_medical_tbody');
        try {
            const { data } = await dbClient.from('worker_medical_records').select('*').eq('company_id', id).order('created_at', { ascending: false });
            if (!data || data.length === 0) { tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; color:#94a3b8;">Sağlık kaydı yok.</td></tr>`; return; }
            tbody.innerHTML = '';
            data.forEach(m => {
                const safeName = (m.worker_name || 'Isimsiz').replace(/'/g, "\\'");
                const safeGoz = (m.goz_secure || '-').replace(/'/g, "\\'");
                const safeKalp = (m.kalp_secure || '-').replace(/'/g, "\\'");
                const safeKas = (m.kas_secure || '-').replace(/'/g, "\\'");
                const safeDecision = (m.final_decision || '-').replace(/'/g, "\\'");

                tbody.innerHTML += `
                    <tr>
                        <td><strong>${m.worker_name || 'İsimsiz'}</strong><br><small>${m.worker_age} Yaş / ${m.worker_gender}</small></td>
                        <td><span class="badge-decision" style="font-size:11px; font-weight:bold; color:#1e40af;">${m.final_decision}</span></td>
                        <td>
                            <button class="pdf-btn" onclick="generateEk2PDF('${safeName}', '${m.worker_age}', '${m.worker_gender}', '${safeGoz}', '${safeKalp}', '${safeKas}', '${safeDecision}')">
                                📄 Ek-2 PDF
                            </button>
                        </td>
                    </tr>
                `;
            });
        } catch (err) { console.error(err.message); }
    }

    // 🎯 SÜZGEÇ ENTEGRE EDİLMİŞ PDF MOTORU
    function generateEk2PDF(name, age, gender, goz, kalp, kas, decision) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        doc.setFont("Helvetica", "bold");
        doc.setFontSize(14);
        doc.text(clearTurkishChars("T.C. CALISMA VE SOSYAL GUVENLIK BAKANLIGI"), 105, 15, { align: "center" });
        doc.setFontSize(11);
        doc.text(clearTurkishChars("IS SAGLIGI VE GUVENLIGI MEVZUATI GEREGI"), 105, 22, { align: "center" });
        doc.text(clearTurkishChars("EK-2 CALISAN PERIYODIK SAGLIK MUAYENE KARTI"), 105, 29, { align: "center" });

        doc.setLineWidth(0.5);
        doc.line(15, 33, 195, 33);

        doc.setFontSize(11);
        doc.text(clearTurkishChars("1. CALISAN VE ISYERI KUNYE BILGILERI"), 15, 41);
        
        doc.autoTable({
            startY: 44,
            theme: 'grid',
            headStyles: { fillColor: [22, 101, 52] },
            body: [
                [clearTurkishChars("Ilgili Sirket / Isyeri Unvani"), clearTurkishChars(currentCompanyName)],
                [clearTurkishChars("Calisanin Adi Soyadi"), clearTurkishChars(name)],
                [clearTurkishChars("Yas / Cinsiyet"), age + " Yas / " + clearTurkishChars(gender)]
            ],
            styles: { font: "Helvetica", fontSize: 10 }
        });

        doc.text(clearTurkishChars("2. PERIYODIK KLINIK MUAYENE BULGULARI"), 15, doc.lastAutoTable.finalY + 10);
        
        doc.autoTable({
            startY: doc.lastAutoTable.finalY + 13,
            theme: 'grid',
            headStyles: { fillColor: [30, 41, 59] },
            head: [[clearTurkishChars("Muayene Edilen Sistem"), clearTurkishChars("Klinik Rapor ve Tehis Bulgulari")]],
            body: [
                [clearTurkishChars("Goz ve Gorme Sistemi Bulgulari (Ek-2)"), clearTurkishChars(goz)],
                [clearTurkishChars("Kardiyovaskuler Sistem (Kalp / Tansiyon)"), clearTurkishChars(kalp)],
                [clearTurkishChars("Kas-Iskelet Sistemi Kontrolu"), clearTurkishChars(kas)]
            ],
            styles: { font: "Helvetica", fontSize: 10 }
        });

        let finalY = doc.lastAutoTable.finalY + 10;
        doc.text(clearTurkishChars("3. HEKIM KANAAT VE SONUC RAPORU"), 15, finalY);
        
        doc.autoTable({
            startY: finalY + 3,
            theme: 'plain',
            body: [
                [clearTurkishChars("Yapilan fiziki muayene ve tetkikler sonucunda calisanin;")]
            ],
            styles: { font: "Helvetica", fontSize: 10, fontStyle: "italic" }
        });

        doc.setDrawColor(22, 163, 74);
        doc.setFillColor(240, 253, 244);
        doc.rect(15, doc.lastAutoTable.finalY + 2, 180, 15, 'FD');
        
        doc.setFont("Helvetica", "bold");
        doc.setFontSize(10);
        doc.text(clearTurkishChars("NIHAI KARAR: " + decision), 20, doc.lastAutoTable.finalY + 11);

        doc.setFont("Helvetica", "normal");
        doc.setFontSize(9);
        doc.text(clearTurkishChars("Isyeri Hekimi Kase / Imza"), 150, doc.lastAutoTable.finalY + 30);
        doc.line(140, doc.lastAutoTable.finalY + 32, 190, doc.lastAutoTable.finalY + 32);

        doc.save("EK_2_Saglik_Karti_" + clearTurkishChars(name).replace(/\s+/g, '_') + ".pdf");
    }
</script>
</body>
</html>
