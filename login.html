        /* ================================

<body>

<div class="login-card">
    <img id="tenant_logo_img" class="tenant-login-logo" alt="Logo">
    <h2><span id="tenant_title">OSGB SaaS</span> Giriş</h2>
    <div id="tenant_hint" style="text-align:center; color:#64748b; font-size:13px; margin-top:-15px; margin-bottom:20px;">Sistem giriş paneli</div>

    <div id="inviteForm" class="hidden">
        <div class="hint-box">
            Davet bağlantınız doğrulandı. Sisteme giriş yapabilmek için lütfen şifrenizi oluşturun.
            <br><br>
            Kullanıcı adınız davet aldığınız e-posta adresidir.
        </div>

        <div class="form-group">
            <label>Yeni Şifre</label>
            <input type="password" id="newPassword" placeholder="En az 6 karakter">
        </div>

        <div class="form-group">
            <label>Yeni Şifre Tekrar</label>
            <input type="password" id="newPasswordAgain" placeholder="Şifrenizi tekrar yazın">
        </div>

        <button id="setPasswordButton" onclick="handleSetPassword()">Şifremi Oluştur ve Devam Et</button>
        <div class="small-link" onclick="showLoginForm()">Zaten şifrem var, giriş ekranına dön</div>
    </div>

    <div id="loginForm">
        <div class="form-group">
            <label>E-Posta Adresi</label>
            <input type="email" id="email" placeholder="E-posta adresiniz">
        </div>

        <div class="form-group">
            <label>Şifre</label>
            <input type="password" id="password" placeholder="••••••">
        </div>

        <button id="loginButton" onclick="handleLogin()">Sisteme Giriş Yap</button>
    </div>

    <div id="message"></div>
</div>

<script>
    const SUPABASE_URL = "https://dnvuizausfcjzkcsynql.supabase.co";
    const SUPABASE_KEY = "sb_publishable_LtrytF9wyS3u-KgSZk7heg_SZc7hhoY";
    const dbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
        auth: {
            detectSessionInUrl: true,
            persistSession: true,
            autoRefreshToken: true
        }
    });

    let currentPrimaryColor = '#2563eb';

    function getTenantSlug() {
        const params = new URLSearchParams(window.location.search);
        const slug = params.get('tenant') || localStorage.getItem('tenant_slug') || 'eses';
        localStorage.setItem('tenant_slug', slug);
        return slug;
    }

    function applyPrimaryColor(color) {
        if (!color) return;
        currentPrimaryColor = color;
        document.querySelectorAll('button:not(.secondary)').forEach((btn) => {
            btn.style.background = color;
        });
    }

    async function loadTenantBrand() {
        const slug = getTenantSlug();
        try {
            const { data, error } = await dbClient.from('tenants').select('name, slug, logo_url, primary_color, is_active').eq('slug', slug).maybeSingle();
            if (!error && data) {
                document.getElementById('tenant_title').innerText = data.name || 'OSGB SaaS';
                document.getElementById('tenant_hint').innerText = 'Giriş adresi: ' + window.location.origin + '/login.html?tenant=' + data.slug;
                const logoImg = document.getElementById('tenant_logo_img');
                if (data.logo_url) { logoImg.src = data.logo_url; logoImg.style.display = 'block'; } else { logoImg.style.display = 'none'; }
                applyPrimaryColor(data.primary_color || currentPrimaryColor);
            }
        } catch (err) {
            console.warn('Tenant bilgisi okunamadı:', err.message);
        }
    }

    function setMessage(text, color) {
        const msg = document.getElementById('message');
        msg.style.color = color || '#334155';
        msg.innerText = text || '';
    }

    function showInviteForm() {
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('inviteForm').classList.remove('hidden');
        setMessage('', '#334155');
        applyPrimaryColor(currentPrimaryColor);
    }

    function showLoginForm() {
        document.getElementById('inviteForm').classList.add('hidden');
        document.getElementById('loginForm').classList.remove('hidden');
        setMessage('', '#334155');
        applyPrimaryColor(currentPrimaryColor);
    }

    function parseHashParams() {
        const hash = window.location.hash || '';
        if (!hash.startsWith('#')) return new URLSearchParams();
        return new URLSearchParams(hash.substring(1));
    }

    function hasInviteMarkers() {
        const hashParams = parseHashParams();
        const queryParams = new URLSearchParams(window.location.search || '');
        const type = hashParams.get('type') || queryParams.get('type');
        return Boolean(
            hashParams.get('access_token') ||
            hashParams.get('refresh_token') ||
            queryParams.get('code') ||
            type === 'invite' ||
            type === 'recovery'
        );
    }

    async function getStaffInviteStatus(email) {
        if (!email) return null;
        try {
            const { data, error } = await dbClient
                .from('osgb_staff')
                .select('auth_invite_status, can_login, is_active_manual, access_role')
                .ilike('email', email)
                .maybeSingle();
            if (error) {
                console.warn('Davet durumu okunamadı:', error.message);
                return null;
            }
            return data;
        } catch (err) {
            console.warn('Davet durumu okunamadı:', err.message);
            return null;
        }
    }

    async function detectInviteOrRecoverySession() {
        const hashParams = parseHashParams();
        const errorDescription = hashParams.get('error_description');
        if (errorDescription) {
            setMessage('Davet bağlantısı kullanılamadı: ' + decodeURIComponent(errorDescription.replace(/\+/g, ' ')), 'red');
            return;
        }

        const inviteMarkers = hasInviteMarkers();
        if (inviteMarkers) {
            setMessage('Davet bağlantısı kontrol ediliyor...', 'blue');
        }

        // Supabase JS bazen davet token'ını otomatik işler ve URL'deki hash/code bilgisini temizler.
        // Bu nedenle sadece URL'ye değil, oluşan oturuma ve osgb_staff davet durumuna da bakıyoruz.
        const { data, error } = await dbClient.auth.getSession();
        if (error) {
            if (inviteMarkers) setMessage('Davet oturumu okunamadı: ' + error.message, 'red');
            return;
        }

        const session = data && data.session ? data.session : null;
        const invitedEmail = session && session.user && session.user.email ? session.user.email : '';
        const staffInfo = invitedEmail ? await getStaffInviteStatus(invitedEmail) : null;
        const inviteStillPending = staffInfo && (staffInfo.auth_invite_status === 'sent' || staffInfo.auth_invite_status === 'not_sent' || !staffInfo.auth_invite_status);

        if (session && (inviteMarkers || inviteStillPending)) {
            if (invitedEmail) document.getElementById('email').value = invitedEmail;
            showInviteForm();
            setMessage(invitedEmail ? ('Davet doğrulandı: ' + invitedEmail) : 'Davet doğrulandı.', 'green');
            history.replaceState(null, '', window.location.pathname + window.location.search);
            return;
        }

        if (inviteMarkers) {
            showInviteForm();
            setMessage('Davet bağlantısı algılandı. Şifre oluşturma için lütfen birkaç saniye bekleyip tekrar deneyin.', 'blue');
        }
    }

    async function handleSetPassword() {
        const password = document.getElementById('newPassword').value;
        const passwordAgain = document.getElementById('newPasswordAgain').value;

        if (!password || !passwordAgain) {
            setMessage('Lütfen iki şifre alanını da doldurun.', 'red');
            return;
        }
        if (password.length < 6) {
            setMessage('Şifre en az 6 karakter olmalı.', 'red');
            return;
        }
        if (password !== passwordAgain) {
            setMessage('Şifreler aynı değil.', 'red');
            return;
        }

        const button = document.getElementById('setPasswordButton');
        button.disabled = true;
        button.innerText = 'Şifre kaydediliyor...';
        setMessage('Şifre kaydediliyor...', 'blue');

        const { data, error } = await dbClient.auth.updateUser({ password });
        if (error) {
            button.disabled = false;
            button.innerText = 'Şifremi Oluştur ve Devam Et';
            setMessage('Şifre oluşturulamadı: ' + error.message, 'red');
            return;
        }

        try {
            const session = await dbClient.auth.getSession();
            const email = session && session.data && session.data.session && session.data.session.user ? session.data.session.user.email : '';
            if (email) {
                await dbClient
                    .from('osgb_staff')
                    .update({ auth_invite_status: 'accepted' })
                    .ilike('email', email);
            }
        } catch (err) {
            console.warn('Davet kabul durumu güncellenemedi:', err.message);
        }

        setMessage('Şifreniz oluşturuldu. Panele yönlendiriliyorsunuz...', 'green');
        history.replaceState(null, '', window.location.pathname + window.location.search);
        setTimeout(() => {
            const slug = getTenantSlug();
            window.location.href = 'dashboard.html?tenant=' + encodeURIComponent(slug);
        }, 1200);
    }

    async function handleLogin() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        if(!email || !password) {
            setMessage('Lütfen tüm alanları doldurun!', 'red');
            return;
        }

        const button = document.getElementById('loginButton');
        button.disabled = true;
        button.innerText = 'Kontrol ediliyor...';
        setMessage('Kimlik doğrulanıyor...', 'blue');

        const { data, error } = await dbClient.auth.signInWithPassword({
            email: email,
            password: password
        });

        if (error) {
            button.disabled = false;
            button.innerText = 'Sisteme Giriş Yap';
            setMessage('Giriş Başarısız: ' + error.message, 'red');
        } else {
            setMessage('Giriş Başarılı! Yönlendiriliyorsunuz...', 'green');
            setTimeout(() => {
                const slug = getTenantSlug();
                window.location.href = 'dashboard.html?tenant=' + encodeURIComponent(slug);
            }, 1000);
        }
    }

    window.onload = async function() {
        await loadTenantBrand();
        await detectInviteOrRecoverySession();
    };
</script>
</body>
</html>
