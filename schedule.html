<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSGB SaaS - Gelişmiş Saha Takvimi</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 🎨 CSS DEĞİŞKENLERİ - TEMA UYUM KATMANI */
        :root {
            --bg-main: #f4f6f9;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --accent-green: #10b981;
            --accent-green-hover: #059669;
            --border-color: #e2e8f0;
            --table-header: #f8fafc;
            --nav-inactive-bg: #e2e8f0;
            --nav-inactive-text: #475569;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-main); color: var(--text-main); padding: 30px; display: none; transition: background 0.3s, color 0.3s; }
        .card { background: var(--bg-card); padding: 25px; border-radius: 12px; max-width: 1050px; margin: 0 auto; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid var(--border-color); transition: background 0.3s; }
        
        h2 { color: var(--text-main); margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: var(--text-muted); font-weight: 600; font-size: 13px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; box-sizing: border-box; background: var(--bg-card); color: var(--text-main); }
        .grid-4 { display: grid; grid-template-columns: 2fr 1.5fr 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        
        button.submit-btn { background: var(--accent-green); color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; }
        button.submit-btn:hover { background: var(--accent-green-hover); }
        
        /* 🦅 ASİL MENÜ BUTONLARI */
        .nav-container { display: flex; gap: 8px; margin-bottom: 25px; justify-content: center; background: var(--table-header); padding: 6px; border-radius: 10px; border: 1px solid var(--border-color); }
        .nav-btn { background: var(--nav-inactive-bg); color: var(--nav-inactive-text); padding: 10px 18px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 13px; transition: all 0.2s ease; border: 1px solid transparent; }
        .nav-btn:hover { background: var(--border-color); color: var(--text-main); }
        .nav-btn.active-page { background: var(--primary); color: white !important; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        
        /* 📅 TAKVİM VE NAVİGASYON TASARIMI */
        .calendar-container { margin-top: 30px; border-top: 2px solid var(--border-color); padding-top: 20px; }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-weight: bold; color: var(--text-main); }
        .month-nav-btn { background: var(--text-main); color: var(--bg-card); border: 1px solid var(--border-color); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .month-nav-btn:hover { opacity: 0.9; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .calendar-day-name { background: var(--table-header); text-align: center; padding: 8px; font-weight: 600; font-size: 12px; color: var(--text-muted); border-radius: 4px; border: 1px solid var(--border-color); }
        .calendar-cell { background: var(--bg-card); border: 1px solid var(--border-color); min-height: 105px; padding: 6px; border-radius: 6px; display: flex; flex-direction: column; justify-content: space-between; position: relative; }
        .calendar-cell-empty { background: var(--table-header); border: 1px dashed var(--border-color); opacity: 0.5; }
        
        /* Görev Kartları */
        .task-badge { font-size: 11px; padding: 4px; border-radius: 4px; margin-top: 4px; font-weight: bold; color: white; line-height: 1.2; cursor: pointer; position: relative; }
        .task-badge:hover { opacity: 0.9; transform: translateY(-1px); }
        .task-incomplete { background: #f97316; } /* Yasal süre eksikse Turuncu kalabilir (Evrensel uyarı) */
        .task-complete { background: var(--accent-green); } /* Tamamlandıysa temanın kendi asil yeşili */
        
        /* 🔔 MODAL */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: var(--bg-card); color: var(--text-main); padding: 25px; border-radius: 12px; width: 400px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); border: 1px solid var(--border-color); }
        .modal-buttons { display: flex; gap: 10px; margin-top: 15px; }
        .btn-update { background: var(--accent-green); color: white; border: none; padding: 10px; border-radius: 6px; flex: 1; font-weight: bold; cursor: pointer; }
        .btn-delete { background: #ef4444; color: white; border: none; padding: 10px; border-radius: 6px; flex: 1; font-weight: bold; cursor: pointer; }
        .btn-close { background: var(--nav-inactive-text); color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; }

        #status { margin-top: 10px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <!-- 🦅 ASİL VE DİNAMİK MENÜ YAPISI -->
    <div class="nav-container">
        <a href="index.html" class="nav-btn">🏢 Firma Yönetimi</a>
        <a href="workers.html" class="nav-btn">👥 Kadro Yönetimi</a>
        <a href="schedule.html" class="nav-btn active-page">📅 Aylık Takvim</a>
        <a href="staff.html" class="nav-btn">🔑 Personel Yönetimi</a>
        <a id="menu_risk" href="risk.html" class="nav-btn" style="display:none;">🦺 Uzman Risk Motoru</a>
        <a id="menu_medical" href="medical.html" class="nav-btn" style="display:none;">🩺 Hekim Sağlık Kartı</a>
    </div>

    <h2>📅 Gelişmiş Saha Ziyaret Takvimi & Planlayıcı</h2>
    <p style="color: var(--text-muted); font-size: 14px;">Ortak operasyon takvimi. Görevlerin üzerine tıklayarak düzenleyebilir veya silebilirsiniz.</p>
    
    <div class="grid-4">
        <div class="form-group">
            <label>Ziyaret Edilecek Firma</label>
            <select id="company_select" onchange="renderCalendarWithTasks()">
                <option value="">Firmalar yükleniyor...</option>
            </select>
        </div>
        <div class="form-group">
            <label>Gidecek Personel / Atama</label>
            <select id="visit_staff"><option value="">Personeller yükleniyor...</option></select>
        </div>
        <div class="form-group">
            <label>Ziyaret Tarihi</label>
            <input type="date" id="visit_date">
        </div>
        <div class="form-group">
            <label>Süre (Dakika)</label>
            <input type="number" id="visit_minutes" placeholder="60">
        </div>
    </div>
    
    <div class="form-group">
        <label>Ziyaret Notu / Faaliyet İçeriği</label>
        <textarea id="visit_notes" rows="2" placeholder="Örn: Aylık saha denetimi..."></textarea>
    </div>

    <button class="submit-btn" onclick="saveSchedule()">Ziyaret Planını Takvime İşle</button>
    <div id="status"></div>

    <div class="calendar-container">
        <div class="calendar-header">
            <div>
                <button class="month-nav-btn" onclick="changeMonth(-1)">◀ Önceki Ay</button>
                <span id="lbl_month_year" style="font-size: 18px; margin: 0 15px; vertical-align: middle;">Haziran 2026</span>
                <button class="month-nav-btn" onclick="changeMonth(1)">Sonraki Ay ▶</button>
            </div>
            <span id="lbl_süre_durumu" style="font-size: 13px; font-weight: bold;"></span>
        </div>
        
        <div class="calendar-grid" id="calendar_grid_body"></div>
    </div>
</div>

<div id="taskModal" class="modal">
    <div class="modal-content">
        <h3 style="margin-top:0; border-bottom:2px solid var(--primary); padding-bottom:8px;">Ziyaret Planını Düzenle</h3>
        <input type="hidden" id="modal_task_id">
        
        <div class="form-group"><label>Yeni Tarih</label><input type="date" id="modal_visit_date"></div>
        <div class="form-group"><label>Yeni Süre (Dakika)</label><input type="number" id="modal_visit_minutes"></div>
        <div class="form-group"><label>Personel Atamasını Değiştir</label><select id="modal_visit_staff"></select></div>
        
        <div class="modal-buttons">
            <button class="btn-update" onclick="updateTask()">Değişiklikleri Kaydet</button>
            <button class="btn-delete" onclick="deleteTask()">Planı Sil</button>
            <button class="btn-close" onclick="closeModal()">Kapat</button>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://dnvuizausfcjzkcsynql.supabase.co";
    const SUPABASE_KEY = "sb_publishable_LtrytF9wyS3u-KgSZk7heg_SZc7hhoY";
    const dbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    let currentDate = new Date(2026, 5, 1); 
    const MONTH_NAMES = ["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"];
    const DAY_NAMES = ["Pzt", "Sal", "Çar", "Per", "Cum", "Cmt", "Paz"];

    // 🎨 TEMA MATRİSİ (TAM ENTEGRASYON İÇİN)
    const themes = {
        isgm: { '--bg-main': '#f4f6f9', '--bg-card': '#ffffff', '--text-main': '#1e293b', '--text-muted': '#64748b', '--primary': '#2563eb', '--primary-hover': '#1d4ed8', '--accent-green': '#10b981', '--accent-green-hover': '#059669', '--border-color': '#e2e8f0', '--table-header': '#f8fafc', '--nav-inactive-bg': '#e2e8f0', '--nav-inactive-text': '#475569' },
        'hekim-dark': { '--bg-main': '#0f172a', '--bg-card': '#1e293b', '--text-main': '#f8fafc', '--text-muted': '#94a3b8', '--primary': '#38bdf8', '--primary-hover': '#7dd3fc', '--accent-green': '#34d399', '--accent-green-hover': '#059669', '--border-color': '#334155', '--table-header': '#1e293b', '--nav-inactive-bg': '#334155', '--nav-inactive-text': '#94a3b8' },
        eskisehir: { '--bg-main': '#fffbf4', '--bg-card': '#ffffff', '--text-main': '#431407', '--text-muted': '#9a3412', '--primary': '#ea580c', '--primary-hover': '#c2410c', '--accent-green': '#84cc16', '--accent-green-hover': '#65a30d', '--border-color': '#fed7aa', '--table-header': '#fff7ed', '--nav-inactive-bg': '#ffedd5', '--nav-inactive-text': '#9a3412' },
        kartal: { '--bg-main': '#f1f5f9', '--bg-card': '#ffffff', '--text-main': '#020617', '--text-muted': '#475569', '--primary': '#0f172a', '--primary-hover': '#334155', '--accent-green': '#000000', '--accent-green-hover': '#1e293b', '--border-color': '#cbd5e1', '--table-header': '#f8fafc', '--nav-inactive-bg': '#e2e8f0', '--nav-inactive-text': '#475569' },
        doga: { '--bg-main': '#f0fdf4', '--bg-card': '#ffffff', '--text-main': '#14532d', '--text-muted': '#166534', '--primary': '#15803d', '--primary-hover': '#166534', '--accent-green': '#65a30d', '--accent-green-hover': '#4d7c0f', '--border-color': '#bbf7d0', '--table-header': '#f0fdf4', '--nav-inactive-bg': '#dcfce7', '--nav-inactive-text': '#14532d' }
    };

    window.onload = async function() {
        // 🧠 HAFIZADAN AKTİF TEMAYI OKU VE YÜKLE
        const activeTheme = localStorage.getItem('selected_theme') || 'isgm';
        if (themes[activeTheme]) {
            Object.keys(themes[activeTheme]).forEach(key => { document.documentElement.style.setProperty(key, themes[activeTheme][key]); });
        }

        const { data: { session } } = await dbClient.auth.getSession();
        if (!session) { window.location.href = "login.html"; return; }
        document.body.style.display = "block";
        
        const email = session.user.email;
        if (email.includes('uzman') || email.includes('admin')) document.getElementById('menu_risk').style.display = 'inline-block';
        if (email.includes('hekim') || email.includes('admin')) document.getElementById('menu_medical').style.display = 'inline-block';
        
        await fetchCompaniesToSelect();
        await populateStaffDropdowns();
        renderCalendarWithTasks();
    };

    async function changeMonth(direction) {
        currentDate.setMonth(currentDate.getMonth() + direction);
        renderCalendarWithTasks();
    }

    async function populateStaffDropdowns() {
        const mainSelect = document.getElementById('visit_staff');
        const modalSelect = document.getElementById('modal_visit_staff');
        try {
            const { data } = await dbClient.from('osgb_staff').select('name_surname, staff_role').order('name_surname');
            let options = '<option value="">-- Personel Seçin --</option>';
            if (data && data.length > 0) {
                data.forEach(s => {
                    const formattedValue = `${s.name_surname} (${s.staff_role})`;
                    options += `<option value="${formattedValue}">${formattedValue}</option>`;
                });
            } else { options = '<option value="">Sistemde kayıtlı personel yok!</option>'; }
            mainSelect.innerHTML = options; modalSelect.innerHTML = options;
        } catch (err) { console.error(err.message); }
    }

    async function fetchCompaniesToSelect() {
        const select = document.getElementById('company_select');
        try {
            const { data } = await dbClient.from('customer_companies').select('id, company_name').order('company_name');
            if (data && data.length > 0) {
                select.innerHTML = '<option value="">-- Tüm Portföyü / Genel Ortak Takvimi Gör --</option>';
                data.forEach(c => { select.innerHTML += `<option value="${c.id}">${c.company_name}</option>`; });
            }
        } catch (err) { console.error(err.message); }
    }

    async function renderCalendarWithTasks() {
        const grid = document.getElementById('calendar_grid_body');
        const selectedCompanyId = document.getElementById('company_select').value;
        const lblSüre = document.getElementById('lbl_süre_durumu');
        
        const year = currentDate.getFullYear(); const month = currentDate.getMonth();
        document.getElementById('lbl_month_year').innerText = `${MONTH_NAMES[month]} ${year}`;
        grid.innerHTML = ''; lblSüre.innerText = '';

        DAY_NAMES.forEach(d => { grid.innerHTML += `<div class="calendar-day-name">${d}</div>`; });

        let firstDayIndex = new Date(year, month, 1).getDay() - 1;
        if (firstDayIndex === -1) firstDayIndex = 6; 
        const totalDaysInMonth = new Date(year, month + 1, 0).getDate();

        try {
            let query = dbClient.from('field_schedules').select('*, customer_companies(company_name, danger_class)');
            if(selectedCompanyId) { query = query.eq('company_id', selectedCompanyId); }
            const { data: schedules } = await query;

            if(selectedCompanyId && schedules) {
                const { data: comp } = await dbClient.from('customer_companies').select('danger_class').eq('id', selectedCompanyId).single();
                const { count } = await dbClient.from('workers').select('*', { count: 'exact', head: true }).eq('company_id', selectedCompanyId);
                let katsayi = comp.danger_class === 'Tehlikeli' ? 20 : (comp.danger_class === 'Çok Tehlikeli' ? 40 : 10);
                let yasalGerekenDk = (count || 0) * katsayi;
                
                let planlananToplamDk = schedules
                    .filter(s => new Date(s.visit_date).getMonth() === month && new Date(s.visit_date).getFullYear() === year)
                    .reduce((sum, s) => sum + s.planned_minutes, 0);
                
                if (planlananToplamDk >= yasalGerekenDk) {
                    lblSüre.innerHTML = `<span style="color:var(--accent-green);">✓ Aylık Hedef Tamam (${planlananToplamDk}/${yasalGerekenDk} dk)</span>`;
                } else {
                    lblSüre.innerHTML = `<span style="color:#f97316;">⚠️ Eksik Süre (${planlananToplamDk}/${yasalGerekenDk} dk Planlandı)</span>`;
                }
            }

            for (let i = 0; i < firstDayIndex; i++) { grid.innerHTML += `<div class="calendar-cell calendar-cell-empty"></div>`; }

            for (let day = 1; day <= totalDaysInMonth; day++) {
                const dayString = `${year}-${(month+1).toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}`;
                const todaysTasks = (schedules || []).filter(s => s.visit_date === dayString);
                let taskHTML = '';

                for (const task of todaysTasks) {
                    const { count: wCount } = await dbClient.from('workers').select('*', { count: 'exact', head: true }).eq('company_id', task.company_id);
                    let katsayi = task.customer_companies.danger_class === 'Tehlikeli' ? 20 : (task.customer_companies.danger_class === 'Çok Tehlikeli' ? 40 : 10);
                    let yasalDk = (wCount || 0) * katsayi;
                    
                    const totalFirmPlan = (schedules || [])
                        .filter(s => s.company_id === task.company_id && new Date(s.visit_date).getMonth() === month)
                        .reduce((sum, s) => sum + s.planned_minutes, 0);
                    
                    const isComplete = totalFirmPlan >= yasalDk;
                    const staffName = task.assigned_staff ? task.assigned_staff : 'Atanmamış';

                    taskHTML += `
                        <div class="task-badge ${isComplete ? 'task-complete' : 'task-incomplete'}" 
                             onclick="openModal('${task.id}', '${task.visit_date}', '${task.planned_minutes}', '${staffName}')"
                             title="${task.notes || ''}">
                            🏢 ${task.customer_companies.company_name.substring(0,5)}.. <br>
                            👤 ${staffName.substring(0,12)} <br>
                            ⏱️ ${task.planned_minutes} dk
                        </div>
                    `;
                }

                grid.innerHTML += `
                    <div class="calendar-cell">
                        <span style="font-weight: bold; opacity: 0.7;">${day}</span>
                        <div style="overflow-y: auto; max-height: 75px; width: 100%;">${taskHTML}</div>
                    </div>
                `;
            }
        } catch (err) { console.error(err.message); }
    }

    function openModal(id, date, minutes, staff) {
        document.getElementById('modal_task_id').value = id;
        document.getElementById('modal_visit_date').value = date;
        document.getElementById('modal_visit_minutes').value = minutes;
        document.getElementById('modal_visit_staff').value = staff;
        document.getElementById('taskModal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('taskModal').style.display = 'none'; }

    async function updateTask() {
        const id = document.getElementById('modal_task_id').value;
        const newDate = document.getElementById('modal_visit_date').value;
        const newMins = parseInt(document.getElementById('modal_visit_minutes').value);
        const newStaff = document.getElementById('modal_visit_staff').value;

        const { error } = await dbClient.from('field_schedules').update({ visit_date: newDate, planned_minutes: newMins, assigned_staff: newStaff }).eq('id', id);
        if (error) alert("Hata: " + error.message); else { closeModal(); renderCalendarWithTasks(); }
    }

    async function deleteTask() {
        if(!confirm("Bu saha ziyaret planını tamamen silmek istediğinize emin misiniz?")) return;
        const id = document.getElementById('modal_task_id').value;
        const { error } = await dbClient.from('field_schedules').delete().eq('id', id);
        if (error) alert("Hata: " + error.message); else { closeModal(); renderCalendarWithTasks(); }
    }

    async function saveSchedule() {
        const compId = document.getElementById('company_select').value;
        const staff = document.getElementById('visit_staff').value; 
        const date = document.getElementById('visit_date').value;
        const mins = document.getElementById('visit_minutes').value;
        const notes = document.getElementById('visit_notes').value;
        const statusDiv = document.getElementById('status');

        if(!compId || !date || !mins || !staff) { statusDiv.style.color = "red"; statusDiv.innerText = "Lütfen tüm alanları eksiksiz seçin!"; return; }
        statusDiv.style.color = "blue"; statusDiv.innerText = "Plan takvime işleniyor...";

        const { error } = await dbClient.from('field_schedules').insert([{ company_id: compId, assigned_staff: staff, visit_date: date, planned_minutes: parseInt(mins), notes: notes }]);
        if (error) { statusDiv.style.color = "red"; statusDiv.innerText = "Hata: " + error.message; }
        else {
            statusDiv.style.color = "var(--accent-green)"; statusDiv.innerText = "🚀 Ziyaret planı başarıyla eklendi!";
            document.getElementById('visit_minutes').value = ''; document.getElementById('visit_notes').value = ''; document.getElementById('visit_staff').value = '';
            renderCalendarWithTasks();
        }
    }
</script>
</body>
</html>
