<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSGB SaaS - Gelişmiş Saha Takvimi</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-main: #f4f6f9;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --accent-green: #10b981;
            --accent-green-hover: #059669;
            --border-color: #e2e8f0;
            --table-header: #f8fafc;
            --nav-inactive-bg: #e2e8f0;
            --nav-inactive-text: #475569;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-main); color: var(--text-main); padding: 30px; display: none; transition: background 0.3s; }
        .card { background: var(--bg-card); padding: 25px; border-radius: 12px; max-width: 1050px; margin: 0 auto; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid var(--border-color); }
        
        /* 🏛️ GLOBAL STANDART ÜST BAR */
        .global-header { border-bottom: 1px solid var(--border-color); padding-bottom: 15px; margin-bottom: 20px; }
        .top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .logo-area { font-size: 18px; font-weight: 800; color: var(--text-main); letter-spacing: 0.5px; display: flex; align-items: center; gap: 8px; }
        .logo-badge { background: var(--primary); color: white; padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; }
        .controls-group { display: flex; align-items: center; gap: 20px; }
        .user-info { font-size: 13px; color: var(--text-muted); font-weight: 600; }
        .logout-btn { background: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; }
        
        .nav-container { display: flex; gap: 8px; justify-content: center; background: var(--table-header); padding: 6px; border-radius: 10px; border: 1px solid var(--border-color); }
        .nav-btn { background: var(--nav-inactive-bg); color: var(--nav-inactive-text); padding: 10px 18px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 13px; transition: all 0.2s ease; }
        .nav-btn:hover { background: var(--border-color); color: var(--text-main); }
        .nav-btn.active-page { background: var(--primary); color: white !important; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        
        .grid-4 { display: grid; grid-template-columns: 2fr 1.5fr 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        button.submit-btn { background: var(--accent-green); color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; }
        
        .calendar-container { margin-top: 30px; border-top: 2px solid var(--border-color); padding-top: 20px; }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-weight: bold; color: var(--text-main); }
        .month-nav-btn { background: var(--text-main); color: var(--bg-card); border: 1px solid var(--border-color); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .calendar-day-name { background: var(--table-header); text-align: center; padding: 8px; font-weight: 600; font-size: 12px; color: var(--text-muted); border-radius: 4px; border: 1px solid var(--border-color); }
        .calendar-cell { background: var(--bg-card); border: 1px solid var(--border-color); min-height: 105px; padding: 6px; border-radius: 6px; display: flex; flex-direction: column; justify-content: space-between; position: relative; }
        .calendar-cell-empty { background: var(--table-header); border: 1px dashed var(--border-color); opacity: 0.5; }
        
        .task-badge { font-size: 11px; padding: 4px; border-radius: 4px; margin-top: 4px; font-weight: bold; color: white; line-height: 1.2; cursor: pointer; }
        .task-incomplete { background: #f97316; }
        .task-complete { background: var(--accent-green); }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: var(--bg-card); color: var(--text-main); padding: 25px; border-radius: 12px; width: 400px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); border: 1px solid var(--border-color); }
        .modal-buttons { display: flex; gap: 10px; margin-top: 15px; }
        .btn-update { background: var(--accent-green); color: white; border: none; padding: 10px; border-radius: 6px; flex: 1; font-weight: bold; cursor: pointer; }
        .btn-delete { background: #ef4444; color: white; border: none; padding: 10px; border-radius: 6px; flex: 1; font-weight: bold; cursor: pointer; }
        .btn-close { background: var(--nav-inactive-text); color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; }
        #status { margin-top: 10px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <div class="global-header">
        <div class="top-row">
            <div class="logo-area">🏢 <span>AKAD OSGB</span> <span class="logo-badge">SaaS</span></div>
            <div class="controls-group">
                <div class="user-info">👤 <span id="current_user_email">...</span></div>
                <button class="logout-btn" onclick="handleLogout()">Güvenli Çıkış</button>
            </div>
        </div>

        <div class="nav-container">
            <a href="dashboard.html" class="nav-btn">🏠 Ana Sayfa</a>
            <a href="index.html" class="nav-btn">🏢 Firma Yönetimi</a>
            <a href="workers.html" class="nav-btn">👥 Kadro Yönetimi</a>
            <a href="schedule.html" class="nav-btn active-page">📅 Aylık Takvim</a>
            <a href="staff.html" class="nav-btn">🔑 Personel Yönetimi</a>
            <a id="menu_risk" href="risk.html" class="nav-btn" style="display:none;">🦺 Uzman Risk Motoru</a>
            <a id="menu_medical" href="medical.html" class="nav-btn" style="display:none;">🩺 Hekim Sağlık Kartı</a>
        </div>
    </div>

    <h2>📅 Gelişmiş Saha Ziyaret Takvimi & Planlayıcı</h2>
    <div class="grid-4">
        <div class="form-group"><label>Ziyaret Edilecek Firma</label><select id="company_select" onchange="renderCalendarWithTasks()"><option value="">Firmalar yükleniyor...</option></select></div>
        <div class="form-group"><label>Gidecek Personel</label><select id="visit_staff"><option value="">Personeller yükleniyor...</option></select></div>
        <div class="form-group"><label>Ziyaret Tarihi</label><input type="date" id="visit_date"></div>
        <div class="form-group"><label>Süre (Dk)</label><input type="number" id="visit_minutes" placeholder="60"></div>
    </div>
    <div class="form-group"><label>Ziyaret Notu</label><textarea id="visit_notes" rows="2" placeholder="Notlar..."></textarea></div>
    <button class="submit-btn" onclick="saveSchedule()">Ziyaret Planını Takvime İşle</button>
    <div id="status"></div>

    <div class="calendar-container">
        <div class="calendar-header">
            <div>
                <button class="month-nav-btn" onclick="changeMonth(-1)">◀ Kıdemli</button>
                <span id="lbl_month_year" style="font-size: 18px; margin: 0 15px;">Haziran 2026</span>
                <button class="month-nav-btn" onclick="changeMonth(1)">Sonraki ▶</button>
            </div>
            <span id="lbl_süre_durumu"></span>
        </div>
        <div class="calendar-grid" id="calendar_grid_body"></div>
    </div>
</div>

<div id="taskModal" class="modal">
    <div class="modal-content">
        <h3>📝 Planı Düzenle</h3>
        <input type="hidden" id="modal_task_id">
        <div class="form-group"><label>Yeni Tarih</label><input type="date" id="modal_visit_date"></div>
        <div class="form-group"><label>Yeni Süre</label><input type="number" id="modal_visit_minutes"></div>
        <div class="form-group"><label>Personel Değiştir</label><select id="modal_visit_staff"></select></div>
        <div class="modal-buttons">
            <button class="btn-update" onclick="updateTask()">Kaydet</button>
            <button class="btn-delete" onclick="deleteTask()">Sil</button>
            <button class="btn-close" onclick="closeModal()">Kapat</button>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://dnvuizausfcjzkcsynql.supabase.co";
    const SUPABASE_KEY = "sb_publishable_LtrytF9wyS3u-KgSZk7heg_SZc7hhoY";
    const dbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let currentDate = new Date(2026, 5, 1);
    const MONTH_NAMES = ["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"];
    const DAY_NAMES = ["Pzt", "Sal", "Çar", "Per", "Cum", "Cmt", "Paz"];

    const themes = {
        isgm: { '--bg-main': '#f4f6f9', '--bg-card': '#ffffff', '--text-main': '#1e293b', '--text-muted': '#64748b', '--primary': '#2563eb', '--primary-hover': '#1d4ed8', '--accent-green': '#10b981', '--accent-green-hover': '#059669', '--border-color': '#e2e8f0', '--table-header': '#f8fafc', '--nav-inactive-bg': '#e2e8f0', '--nav-inactive-text': '#475569' },
        'hekim-dark': { '--bg-main': '#0f172a', '--bg-card': '#1e293b', '--text-main': '#f8fafc', '--text-muted': '#94a3b8', '--primary': '#38bdf8', '--primary-hover': '#7dd3fc', '--accent-green': '#34d399', '--accent-green-hover': '#059669', '--border-color': '#334155', '--table-header': '#1e293b', '--nav-inactive-bg': '#334155', '--nav-inactive-text': '#94a3b8' },
        eskisehir: { '--bg-main': '#fffbf4', '--bg-card': '#ffffff', '--text-main': '#431407', '--text-muted': '#9a3412', '--primary': '#ea580c', '--border-color': '#fed7aa', '--table-header': '#fff7ed', '--nav-inactive-bg': '#ffedd5', '--nav-inactive-text': '#9a3412' },
        kartal: { '--bg-main': '#f1f5f9', '--bg-card': '#ffffff', '--text-main': '#020617', '--text-muted': '#475569', '--primary': '#0f172a', '--border-color': '#cbd5e1', '--table-header': '#f8fafc', '--nav-inactive-bg': '#e2e8f0', '--nav-inactive-text': '#475569' },
        doga: { '--bg-main': '#f0fdf4', '--bg-card': '#ffffff', '--text-main': '#14532d', '--text-muted': '#166534', '--primary': '#15803d', '--border-color': '#bbf7d0', '--table-header': '#f0fdf4', '--nav-inactive-bg': '#dcfce7', '--nav-inactive-text': '#14532d' }
    };

    window.onload = async function() {
        const activeTheme = localStorage.getItem('selected_theme') || 'isgm';
        if (themes[activeTheme]) { Object.keys(themes[activeTheme]).forEach(key => { document.documentElement.style.setProperty(key, themes[activeTheme][key]); }); }
        const { data: { session } } = await dbClient.auth.getSession();
        if (!session) { window.location.href = "login.html"; return; }
        document.body.style.display = "block";
        const email = session.user.email;
        document.getElementById('current_user_email').innerText = email;
        if (email.includes('uzman') || email.includes('admin')) document.getElementById('menu_risk').style.display = 'inline-block';
        if (email.includes('hekim') || email.includes('admin')) document.getElementById('menu_medical').style.display = 'inline-block';
        await fetchCompaniesToSelect(); await populateStaffDropdowns(); renderCalendarWithTasks();
    };

    async function changeMonth(direction) { currentDate.setMonth(currentDate.getMonth() + direction); renderCalendarWithTasks(); }
    async function handleLogout() { await dbClient.auth.signOut(); window.location.href = "login.html"; }

    async function populateStaffDropdowns() {
        const mainSelect = document.getElementById('visit_staff'); const modalSelect = document.getElementById('modal_visit_staff');
        const { data } = await dbClient.from('osgb_staff').select('name_surname, staff_role').order('name_surname');
        let options = '<option value="">-- Personel Seçin --</option>';
        if (data) { data.forEach(s => { options += `<option value="${s.name_surname} (${s.staff_role})">${s.name_surname} (${s.staff_role})</option>`; }); }
        mainSelect.innerHTML = options; modalSelect.innerHTML = options;
    }

    async function fetchCompaniesToSelect() {
        const select = document.getElementById('company_select');
        const { data } = await dbClient.from('customer_companies').select('id, company_name').order('company_name');
        select.innerHTML = '<option value="">-- Tüm Portföyü Gör --</option>';
        if (data) { data.forEach(c => { select.innerHTML += `<option value="${c.id}">${c.company_name}</option>`; }); }
    }

    async function renderCalendarWithTasks() {
        const grid = document.getElementById('calendar_grid_body'); const selectedCompanyId = document.getElementById('company_select').value;
        const lblSüre = document.getElementById('lbl_süre_durumu');
        const year = currentDate.getFullYear(); const month = currentDate.getMonth();
        document.getElementById('lbl_month_year').innerText = `${MONTH_NAMES[month]} ${year}`;
        grid.innerHTML = '';

        DAY_NAMES.forEach(d => { grid.innerHTML += `<div class="calendar-day-name">${d}</div>`; });
        let firstDayIndex = new Date(year, month, 1).getDay() - 1; if (firstDayIndex === -1) firstDayIndex = 6;
        const totalDaysInMonth = new Date(year, month + 1, 0).getDate();

        let query = dbClient.from('field_schedules').select('*, customer_companies(company_name, danger_class)');
        if(selectedCompanyId) { query = query.eq('company_id', selectedCompanyId); }
        const { data: schedules } = await query;

        if(selectedCompanyId && schedules) {
            const { data: comp } = await dbClient.from('customer_companies').select('danger_class').eq('id', selectedCompanyId).single();
            const { count } = await dbClient.from('workers').select('*', { count: 'exact', head: true }).eq('company_id', selectedCompanyId);
            let katsayi = comp.danger_class === 'Tehlikeli' ? 20 : (comp.danger_class === 'Çok Tehlikeli' ? 40 : 10);
            let yasalGerekenDk = (count || 0) * katsayi;
            let planlananToplamDk = schedules.filter(s => new Date(s.visit_date).getMonth() === month).reduce((sum, s) => sum + s.planned_minutes, 0);
            lblSüre.innerHTML = planlananToplamDk >= yasalGerekenDk ? `<span style="color:var(--accent-green); font-weight:bold;">✓ Hedef Tamam</span>` : `<span style="color:#f97316; font-weight:bold;">⚠️ Eksik Süre</span>`;
        }

        for (let i = 0; i < firstDayIndex; i++) { grid.innerHTML += `<div class="calendar-cell calendar-cell-empty"></div>`; }

        for (let day = 1; day <= totalDaysInMonth; day++) {
            const dayString = `${year}-${(month+1).toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}`;
            const todaysTasks = (schedules || []).filter(s => s.visit_date === dayString);
            let taskHTML = '';
            todaysTasks.forEach(task => {
                taskHTML += `<div class="task-badge task-complete" onclick="openModal('${task.id}', '${task.visit_date}', '${task.planned_minutes}', '${task.assigned_staff || ''}')">🏢 ${task.customer_companies.company_name.substring(0,5)}..<br>⏱️ ${task.planned_minutes} dk</div>`;
            });
            grid.innerHTML += `<div class="calendar-cell"><span style="font-weight: bold; opacity: 0.7;">${day}</span><div style="overflow-y: auto; max-height: 75px; width:100%;">${taskHTML}</div></div>`;
        }
    }

    function openModal(id, date, minutes, staff) {
        document.getElementById('modal_task_id').value = id; document.getElementById('modal_visit_date').value = date;
        document.getElementById('modal_visit_minutes').value = minutes; document.getElementById('modal_visit_staff').value = staff;
        document.getElementById('taskModal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('taskModal').style.display = 'none'; }
    async function updateTask() { const id = document.getElementById('modal_task_id').value; await dbClient.from('field_schedules').update({ visit_date: document.getElementById('modal_visit_date').value, planned_minutes: parseInt(document.getElementById('modal_visit_minutes').value), assigned_staff: document.getElementById('modal_visit_staff').value }).eq('id', id); closeModal(); renderCalendarWithTasks(); }
    async function deleteTask() { if(confirm("Silinsin mi?")) { await dbClient.from('field_schedules').delete().eq('id', document.getElementById('modal_task_id').value); closeModal(); renderCalendarWithTasks(); } }
    async function saveSchedule() { await dbClient.from('field_schedules').insert([{ company_id: document.getElementById('company_select').value, assigned_staff: document.getElementById('visit_staff').value, visit_date: document.getElementById('visit_date').value, planned_minutes: parseInt(document.getElementById('visit_minutes').value), notes: document.getElementById('visit_notes').value }]); renderCalendarWithTasks(); }
</script>
</body>
</html>
